<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">

<style>
  .yd-download-bar {
    background: linear-gradient(135deg, #1a1d2e 0%, #111318 100%);
    border: 1px solid #2a2d3e;
    border-radius: 12px;
    padding: 24px 32px;
    margin: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .yd-download-bar__info h3 {
    font-size: 16px;
    font-weight: 600;
    color: #e2e8f0;
    margin-bottom: 4px;
  }
  .yd-download-bar__info p {
    font-size: 13px;
    color: #64748b;
  }
  .yd-download-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #6366f1;
    color: #fff;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
  }
  .yd-download-btn:hover { background: #818cf8; transform: translateY(-1px); }
</style>

<body class="home-page dashboard-page">

<div class="dashboard-galaxy" aria-hidden="true">
  <canvas id="homeGalaxyCanvas" class="dashboard-galaxy__canvas"></canvas>
</div>

<main class="dashboard-shell">
